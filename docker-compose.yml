# =============================================================================
# SmartTalker Central — Docker Compose
# AI Stack: DashScope (LLM) + CosyVoice (TTS) + FunASR (ASR) — CPU only
# Database: PostgreSQL 16 + Redis 7
# Usage: docker compose up -d
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Core: SmartTalker FastAPI application (CPU only)
  # LLM → DashScope API | TTS → CosyVoice | ASR → FunASR SenseVoice
  # ---------------------------------------------------------------------------
  core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smarttalker-core
    restart: unless-stopped
    ports:
      - "${API_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - DATABASE_URL=postgresql+asyncpg://smarttalker:${POSTGRES_PASSWORD:-smarttalker}@postgres:5432/smarttalker
      - LLM_BASE_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - LLM_API_KEY=${DASHSCOPE_API_KEY}
      - KB_EMBEDDING_API_URL=https://dashscope.aliyuncs.com/compatible-mode/v1
      - KB_EMBEDDING_API_KEY=${DASHSCOPE_API_KEY}
      # AI Agent configuration
      - AGENT_AGENT_ENABLED=true
      - AGENT_AUTO_FIX_ENABLED=true
      - AGENT_SCAN_INTERVAL_S=60
      - AGENT_AUDIT_LOG_PATH=/app/logs/agent_audit.jsonl
      - AGENT_NOTIFICATION_EMAIL_ENABLED=${AGENT_NOTIFICATION_EMAIL_ENABLED:-true}
      - AGENT_NOTIFICATION_EMAIL_TO=${AGENT_NOTIFICATION_EMAIL_TO:-contact@maskki.com}
      # SMTP (email alerts)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-agent@maskki.com}
    volumes:
      - ./models:/app/models
      - ./clips:/app/clips
      - ./voices:/app/voices
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s
    networks:
      - smarttalker-net

  # ---------------------------------------------------------------------------
  # PostgreSQL: Primary database (multi-tenant)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: smarttalker-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: smarttalker
      POSTGRES_USER: smarttalker
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U smarttalker" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smarttalker-net

  # ---------------------------------------------------------------------------
  # Redis: caching, session store, rate limiting, kill switch cache
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: smarttalker-redis
    restart: unless-stopped
    # No host port exposure — only reachable via smarttalker-net
    volumes:
      - redis-data:/data
    command: >-
      redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set in .env}
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - smarttalker-net

  # ---------------------------------------------------------------------------
  # Nginx: Reverse proxy (dev — HTTP only)
  # ---------------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: smarttalker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./outputs:/app/files:ro
      - ./clips:/app/clips:ro
      - ./frontend:/app/frontend:ro
    depends_on:
      - core
    networks:
      - smarttalker-net

  # ---------------------------------------------------------------------------
  # Monitoring: Prometheus & Grafana
  # ---------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: smarttalker-prometheus
    restart: unless-stopped
    # No host port exposure — access via Grafana or internal network only
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    networks:
      - smarttalker-net

  grafana:
    image: grafana/grafana:latest
    container_name: smarttalker-grafana
    restart: unless-stopped
    # No host port exposure — access via nginx reverse proxy only
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:?GRAFANA_ADMIN_PASSWORD must be set in .env}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=${GRAFANA_ROOT_URL:-http://localhost/grafana}
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    networks:
      - smarttalker-net

  # ---------------------------------------------------------------------------
  # Ollama (OPTIONAL — only needed for local dev without DashScope)
  # Usage: docker compose --profile local-llm up -d
  # ---------------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: smarttalker-ollama
    restart: unless-stopped
    profiles:
      - local-llm
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - smarttalker-net

# =============================================================================
# Volumes & Networks
# =============================================================================
volumes:
  postgres-data:
    driver: local
  ollama-data:
    driver: local
  redis-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  smarttalker-net:
    driver: bridge
