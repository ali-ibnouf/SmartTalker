# =============================================================================
# SmartTalker — Nginx Production Configuration (Security Hardened)
# SSL termination for wss://ws.maskki.com
# Certs: /etc/letsencrypt/live/ws.maskki.com/
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    upstream smarttalker {
        server central:8000;
    }

    # Rate limiting zones
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=ws_conn:10m rate=10r/s;

    # Request body size limit (50MB for VRM uploads)
    client_max_body_size 50m;

    # Hide server version
    server_tokens off;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── Security headers (applied globally) ────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-XSS-Protection "0" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    # ── Block direct IP access (no valid Host header) ──────────────────────
    server {
        listen 80 default_server;
        listen 443 ssl default_server;
        server_name _;

        ssl_certificate     /etc/letsencrypt/live/ws.maskki.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ws.maskki.com-0001/privkey.pem;

        # Return 444 (connection closed without response)
        return 444;
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────
    server {
        listen 80;
        server_name ws.maskki.com;

        # Let's Encrypt ACME challenge (for cert renewal)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS server (wss://ws.maskki.com) ─────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name ws.maskki.com;

        # SSL certificates (Let's Encrypt / certbot)
        ssl_certificate     /etc/letsencrypt/live/ws.maskki.com-0001/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/ws.maskki.com-0001/privkey.pem;

        # TLS configuration — TLS 1.3 ONLY
        ssl_protocols TLSv1.3;
        ssl_ciphers EECDH+AESGCM:EDH+AESGCM;
        ssl_prefer_server_ciphers on;
        ssl_session_timeout 1d;
        ssl_session_cache shared:SSL:10m;
        ssl_session_tickets off;

        # HSTS (2 years, include subdomains, preload-ready)
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Content Security Policy
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' wss: ws:; font-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

        # ── Block common attack paths ────────────────────────────────────
        location ~* \.(git|env|bak|sql|log|ini|conf)$ {
            return 404;
        }
        location ~ /\.git {
            return 404;
        }
        location ~ /\. {
            return 404;
        }

        # ── Visitor session WebSocket — wss://ws.maskki.com/session ──────
        location /session {
            limit_req zone=ws_conn burst=5 nodelay;

            proxy_pass http://smarttalker;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_connect_timeout 10s;
        }

        # ── WebSocket endpoints (/ws/*) ──────────────────────────────────
        location /ws/ {
            limit_req zone=ws_conn burst=5 nodelay;

            proxy_pass http://smarttalker;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Health check (no auth, no rate limit) ────────────────────────
        location /health {
            proxy_pass http://smarttalker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/health {
            proxy_pass http://smarttalker;
            proxy_set_header Host $host;
        }

        # ── Auth endpoints — stricter rate limit ─────────────────────────
        location /api/v1/auth/ {
            limit_req zone=auth burst=3 nodelay;

            proxy_pass http://smarttalker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── API endpoints — rate limited ─────────────────────────────────
        location /api/ {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://smarttalker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # API timeouts
            proxy_read_timeout 30s;
            proxy_send_timeout 30s;
        }

        # ── Webhooks (Paddle, WhatsApp, Telegram) ────────────────────────
        location /webhooks/ {
            proxy_pass http://smarttalker;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # ── Metrics (internal only — block external access) ─────────────
        location /metrics {
            deny all;
            return 403;
        }

        # ── Block everything else ────────────────────────────────────────
        location / {
            return 444;
        }
    }
}
