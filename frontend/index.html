<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartTalker</title>
    <link rel="stylesheet" href="style.css">

    <!-- Import Maps for Three.js and @pixiv/three-vrm -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
            "@pixiv/three-vrm": "https://unpkg.com/@pixiv/three-vrm@3.3.3/lib/three-vrm.module.js"
        }
    }
    </script>
</head>

<body>
    <!-- ── Header ─────────────────────────────────────────────────── -->
    <header id="header">
        <div class="header-left">
            <h1>SmartTalker</h1>
            <span class="subtitle">Digital Human AI Agent</span>
        </div>
        <nav class="nav-links" style="display: flex; gap: 15px;">
            <a href="index.html" class="active" style="color: #fff; text-decoration: none;">Chat</a>
            <a href="operator.html" style="color: #8b949e; text-decoration: none;">Operator</a>
            <a href="dashboard.html" style="color: #8b949e; text-decoration: none;">Dashboard</a>
        </nav>
        <div class="header-right">
            <span id="status-dot" class="dot disconnected"></span>
            <span id="status-text">Disconnected</span>
        </div>
    </header>

    <!-- ── Main Layout ────────────────────────────────────────────── -->
    <main id="main">
        <!-- Left: Chat Panel -->
        <section id="chat-panel">
            <div id="chat-messages"></div>

            <div id="chat-input-bar">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" maxlength="2000"
                    disabled />
                <button id="send-btn" disabled>Send</button>
            </div>
        </section>

        <!-- Right: Media Panel -->
        <section id="media-panel">
            <!-- Avatar Video (pre-generated clips) -->
            <div id="video-container">
                <video id="avatar-video" autoplay loop muted playsinline></video>
                <!-- VRM Canvas (3D realtime) -->
                <canvas id="vrm-canvas" style="display:none; width: 100%; height: 100%; object-fit: cover;"></canvas>
                <video id="local-video" autoplay playsinline muted></video>
            </div>

            <!-- Audio Playback (hidden, used programmatically) -->
            <audio id="response-audio" preload="auto" crossorigin="anonymous"></audio>

            <!-- WebRTC Controls -->
            <div id="rtc-controls">
                <button id="connect-btn">Connect</button>
                <button id="disconnect-btn" disabled>Disconnect</button>
                <button id="mic-btn" class="mic-off" disabled>
                    <span class="mic-icon">&#127908;</span>
                    <span class="mic-label">Push to Talk</span>
                </button>
                <button id="scan-doc-btn" disabled title="Scan Document">
                    <span class="scan-icon">&#128247;</span>
                    <span class="scan-label">Scan Document</span>
                </button>
            </div>

            <!-- Audio Visualizer -->
            <canvas id="audio-visualizer" width="300" height="60"></canvas>

            <!-- Session Config -->
            <details id="config-panel">
                <summary>Session Settings</summary>
                <div class="config-grid">
                    <label for="cfg-language">Language</label>
                    <select id="cfg-language">
                        <option value="ar" selected>Arabic</option>
                        <option value="en">English</option>
                    </select>

                    <label for="cfg-avatar">Avatar ID</label>
                    <input type="text" id="cfg-avatar" value="default" />

                    <label for="cfg-voice">Voice ID</label>
                    <input type="text" id="cfg-voice" placeholder="default" />
                </div>
                <button id="cfg-apply">Apply Settings</button>
            </details>

            <!-- Latency Info -->
            <div id="latency-bar">
                <span id="latency-text">--</span>
            </div>
        </section>
    </main>

    <!-- ── Footer ─────────────────────────────────────────────────── -->
    <footer id="footer">
        <span>SmartTalker v1.0</span>
        <span id="session-id-display">Session: --</span>
    </footer>

    <canvas id="scan-canvas" style="display:none;"></canvas>
    <a id="scan-download" style="display:none;"></a>

    <!-- VRM Setup script -->
    <script type="module" src="vrm.js"></script>
    <script src="app.js"></script>
</body>

</html>
