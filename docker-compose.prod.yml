# =============================================================================
# SmartTalker — Production Docker Compose
# Phase 1: DashScope cloud APIs + RunPod Serverless + Cloudflare R2
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# =============================================================================

services:
  # ── Core: production overrides ────────────────────────────────────
  core:
    ports: !reset []
    environment:
      # General
      - APP_ENV=production
      - DEBUG=false
      - LOG_LEVEL=INFO
      # API
      - API_KEY=${API_KEY:?API_KEY must be set for production}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-}
      - CORS_ORIGINS=${CORS_ORIGINS:-https://admin.yourdomain.com,https://app.yourdomain.com}
      - RATE_LIMIT_PER_MINUTE=${RATE_LIMIT_PER_MINUTE:-60}
      # Database
      - DATABASE_URL=postgresql+asyncpg://smarttalker:${POSTGRES_PASSWORD}@postgres:5432/smarttalker
      # Redis (with password)
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      # DashScope (LLM + ASR + TTS shared key)
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:?DASHSCOPE_API_KEY must be set}
      - DASHSCOPE_BASE_URL=https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - DASHSCOPE_WS_URL=wss://dashscope-intl.aliyuncs.com/api-ws/v1/realtime
      - LLM_MODEL_NAME=qwen3-max
      - LLM_BASE_URL=https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - LLM_API_KEY=${DASHSCOPE_API_KEY}
      # RunPod Serverless
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:?RUNPOD_API_KEY must be set}
      - RUNPOD_ENDPOINT_MUSETALK=${RUNPOD_ENDPOINT_MUSETALK:?RUNPOD_ENDPOINT_MUSETALK must be set}
      - RUNPOD_ENDPOINT_PREPROCESS=${RUNPOD_ENDPOINT_PREPROCESS:?RUNPOD_ENDPOINT_PREPROCESS must be set}
      # Cloudflare R2
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID:?R2_ACCOUNT_ID must be set}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID:?R2_ACCESS_KEY_ID must be set}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY:?R2_SECRET_ACCESS_KEY must be set}
      - R2_BUCKET=${R2_BUCKET:-maskki-media}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL:?R2_PUBLIC_URL must be set}
      # Knowledge Base
      - KB_EMBEDDING_API_URL=https://dashscope-intl.aliyuncs.com/compatible-mode/v1
      - KB_EMBEDDING_API_KEY=${DASHSCOPE_API_KEY}
      # AI Agent
      - AGENT_AGENT_ENABLED=true
      - AGENT_AUTO_FIX_ENABLED=true
      - AGENT_SCAN_INTERVAL_S=60
      - AGENT_AUDIT_LOG_PATH=/app/logs/agent_audit.jsonl
      - AGENT_NOTIFICATION_EMAIL_ENABLED=${AGENT_NOTIFICATION_EMAIL_ENABLED:-true}
      - AGENT_NOTIFICATION_EMAIL_TO=${AGENT_NOTIFICATION_EMAIL_TO:-contact@lsmarttech.com}
      # SMTP
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-agent@yourdomain.com}
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/api/v1/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # ── AI Optimization Agent (standalone) ────────────────────────────
  ai-agent:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: smarttalker-ai-agent
    restart: always
    environment:
      - DATABASE_URL=postgresql+asyncpg://smarttalker:${POSTGRES_PASSWORD}@postgres:5432/smarttalker
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - ALERT_EMAIL=contact@lsmarttech.com
      # DashScope (health checks + LLM calls)
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY}
      - DASHSCOPE_BASE_URL=${DASHSCOPE_BASE_URL}
      - LLM_MODEL=${LLM_MODEL}
      # RunPod (endpoint monitoring)
      - RUNPOD_API_KEY=${RUNPOD_API_KEY}
      - RUNPOD_ENDPOINT_MUSETALK=${RUNPOD_ENDPOINT_MUSETALK}
      - RUNPOD_ENDPOINT_PREPROCESS=${RUNPOD_ENDPOINT_PREPROCESS}
      # R2 (connectivity checks)
      - R2_ENDPOINT_URL=${R2_ENDPOINT_URL}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET=${R2_BUCKET:-maskki-media}
      # Agent config
      - AGENT_AGENT_ENABLED=true
      - AGENT_AUTO_FIX_ENABLED=true
      - AGENT_SCAN_INTERVAL_S=60
      - AGENT_AUDIT_LOG_PATH=/app/logs/agent_audit.jsonl
      - AGENT_NOTIFICATION_EMAIL_ENABLED=${AGENT_NOTIFICATION_EMAIL_ENABLED:-true}
      - AGENT_NOTIFICATION_EMAIL_TO=${AGENT_NOTIFICATION_EMAIL_TO:-contact@lsmarttech.com}
      # SMTP (for email alerts)
      - SMTP_HOST=${SMTP_HOST:-smtp.gmail.com}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USERNAME=${SMTP_USERNAME:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-agent@lsmarttech.com}
    depends_on:
      - postgres
      - redis
    volumes:
      - ./logs/agent:/app/logs
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8081/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - smarttalker-net

  # ── Nginx: Reverse proxy + SSL termination ────────────────────────
  nginx:
    image: nginx:alpine
    container_name: smarttalker-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./outputs:/app/files:ro
      - ./clips:/app/clips:ro
    depends_on:
      - core
    networks:
      - smarttalker-net

  # ── PostgreSQL: production overrides ────────────────────────────────
  postgres:
    ports: !reset []
    # No host port exposure in production — only reachable via internal network

    # ── Alertmanager ──────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:v0.27.0
    container_name: smarttalker-alertmanager
    restart: unless-stopped
    # No host port — access via internal network only
    volumes:
      - ./alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    command:
      - '--config.file=/etc/alertmanager/alertmanager.yml'
      - '--storage.path=/alertmanager'
    networks:
      - smarttalker-net

  # ── Redis Exporter ────────────────────────────────────────────────
  redis-exporter:
    image: oliver006/redis_exporter:latest
    container_name: smarttalker-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      - redis
    networks:
      - smarttalker-net
